<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .joke-box {
            background: #f5f5f5;
            border-left: 5px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            color: #333;
            line-height: 1.6;
        }

        .joke-box.loading {
            color: #999;
            font-style: italic;
        }

        .joke-box.error {
            color: #d32f2f;
            border-left-color: #d32f2f;
        }

        .joke-setup {
            margin-bottom: 15px;
            font-weight: 500;
        }

        .joke-punchline {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .joke-type {
            font-size: 0.85em;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        a {
            text-decoration: none;
        }

        a button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        a button:hover {
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh with a single click!</p>

        <div class="joke-box" id="jokeBox">
            Click "Get Joke" to start laughing!
        </div>

        <div class="button-group">
            <button id="getJokeBtn" onclick="getJoke()">Get Joke</button>
            <button id="nextJokeBtn" onclick="getJoke()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">Next Joke</button>
            <a href="Recruiting Operations Portfolio.pdf" download><button>Download My PDF</button></a>
        </div>

        <div class="joke-type" id="jokeType"></div>
    </div>

    <script>
        const jokeBox = document.getElementById('jokeBox');
        const jokeType = document.getElementById('jokeType');
        const getJokeBtn = document.getElementById('getJokeBtn');
        const nextJokeBtn = document.getElementById('nextJokeBtn');

        async function getJoke() {
            // Disable buttons while loading
            getJokeBtn.disabled = true;
            nextJokeBtn.disabled = true;

            jokeBox.classList.add('loading');
            jokeBox.textContent = 'Loading joke...';
            jokeType.textContent = '';

            try {
                // Using the JokeAPI (https://jokeapi.dev/)
                const response = await fetch('https://v2.jokeapi.dev/joke/any');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                jokeBox.classList.remove('loading', 'error');

                if (data.type === 'single') {
                    // Single-line joke
                    jokeBox.textContent = data.joke;
                    jokeType.textContent = `Type: ${data.category}`;
                } else if (data.type === 'twopart') {
                    // Two-part joke (setup and punchline)
                    jokeBox.innerHTML = `
                        <div>
                            <div class="joke-setup">${data.setup}</div>
                            <div class="joke-punchline">${data.delivery}</div>
                        </div>
                    `;
                    jokeType.textContent = `Type: ${data.category}`;
                }
            } catch (error) {
                jokeBox.classList.add('error');
                jokeBox.classList.remove('loading');
                jokeBox.textContent = `Oops! ${error.message}. Please try again.`;
                jokeType.textContent = '';
            } finally {
                // Re-enable buttons
                getJokeBtn.disabled = false;
                nextJokeBtn.disabled = false;
            }
        }

        // Load a joke on page load
        window.addEventListener('DOMContentLoaded', getJoke);
    </script>
</body>
</html>
